<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习作单元 - 四年级语文</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fff8e1 0%,#fff3e0 100%);min-height:100vh;padding:16px}
  .container{max-width:800px;margin:0 auto}
  .header{text-align:center;padding:24px 16px;background:linear-gradient(135deg,#E65100,#FF9800);border-radius:20px;color:#fff;margin-bottom:16px;box-shadow:0 4px 20px rgba(230,81,0,0.3)}
  .header h1{font-size:1.6em;margin-bottom:4px}
  .header p{font-size:0.85em;opacity:.9;line-height:1.4}
  .tab-bar{display:flex;gap:4px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;margin-bottom:12px}
  .tab-btn{flex-shrink:0;padding:10px 18px;border:none;border-radius:12px 12px 0 0;font-size:0.85em;font-weight:600;cursor:pointer;background:#e0e0e0;color:#666;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .tab-btn.active{background:#fff;color:#E65100;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
  .tab-btn:active{transform:scale(.95)}
  .content-area{background:#fff;border-radius:0 16px 16px 16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);min-height:400px}
  .tab-content{display:none}
  .tab-content.active{display:block;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .lesson-title{font-size:1.2em;font-weight:700;color:#1a237e;margin-bottom:12px;padding-bottom:8px;border-bottom:3px solid #fff3e0}
  .section-title{font-size:.95em;font-weight:600;color:#555;margin:14px 0 8px;display:flex;align-items:center;gap:6px}
  .section-title::before{content:'';display:inline-block;width:3px;height:14px;background:#E65100;border-radius:2px}
  .word-list{display:flex;flex-wrap:wrap;gap:6px}
  .word-tag{padding:4px 12px;background:#f5f5f5;border-radius:16px;font-size:.85em;color:#555;border:1px solid #e0e0e0}
  .key-points{padding-left:16px}
  .key-points li{font-size:.9em;color:#444;line-height:1.7;margin-bottom:4px}
  .back-link{display:block;text-align:center;padding:16px;color:#888;text-decoration:none;font-size:.85em;margin-top:16px}
  @media(max-width:500px){body{padding:10px}.header h1{font-size:1.3em}.tab-btn{padding:8px 12px;font-size:.8em}.content-area{padding:14px;border-radius:0 12px 12px 12px}}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>✏️ 习作单元</h1><p>四年级上册 · 第五单元 · 点击下方标签切换内容</p></div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="content-area" id="contentArea"></div>
  <a href="../index.html" class="back-link">← 返回目录</a>
</div>
<script>
const lessons=[
  {
    id:'maque', label:'麻雀（习作例文）', title:'习作例文：麻雀（屠格涅夫）',
    renzi:'',xiezi:[],ciyu:[],
    yaodian:[
      '按事情发展顺序叙述：起因→经过→结果',
      '把看到的、听到的、想到的都写下来',
      '重点学习：怎样把一件事写清楚',
      '感受老麻雀保护小麻雀的勇气和力量'
    ]
  },
  {
    id:'xiezuo', label:'我的心儿怦怦跳', title:'✍️ 习作：我的心儿怦怦跳',
    renzi:'',xiezi:[],ciyu:[],
    yaodian:[
      '选一件让自己紧张、害怕、激动的事',
      '写清楚事情的起因、经过、结果',
      '运用心理描写，写出当时的感受',
      '可以用"我的心儿怦怦跳"作为题目',
      '尝试运用"害怕极了""紧张万分"等词语'
    ]
  },
  {
    id:'ywd', label:'语文园地', title:'📚 语文园地',
    renzi:'',xiezi:[],ciyu:[],
    yaodian:[
      '交流平台：学习从不同角度理解课文',
      '体会人物品质：勇敢、善良、坚持不懈',
      '把一件事写清楚的方法：时间、地点、人物、起因、经过、结果',
      '积累好词好句，提升表达能力'
    ]
  }
];
function init(){const tabBar=document.getElementById('tabBar'),content=document.getElementById('contentArea');lessons.forEach((l,i)=>{const tab=document.createElement('button');tab.className='tab-btn'+(i===0?' active':'');tab.textContent=l.label;tab.onclick=()=>switchTab(i);tabBar.appendChild(tab);const div=document.createElement('div');div.className='tab-content'+(i===0?' active':'');div.innerHTML=buildContent(l);content.appendChild(div)})}
function buildContent(l){let h=`<div class="lesson-title">${l.title}</div>`;if(l.ciyu&&l.ciyu.length){h+=`<div class="section-title">重点词语</div><div class="word-list">`;l.ciyu.forEach(w=>{h+=`<span class="word-tag">${w}</span>`});h+=`</div>`}if(l.yaodian&&l.yaodian.length){h+=`<div class="section-title">要点提示</div><ul class="key-points">`;l.yaodian.forEach(p=>{h+=`<li>${p}</li>`});h+=`</ul>`}return h}
function switchTab(i){document.querySelectorAll('.tab-btn').forEach((t,j)=>{t.classList.toggle('active',j===i)});document.querySelectorAll('.tab-content').forEach((c,j)=>{c.classList.toggle('active',j===i)})}
init();
</script>
</body>
</html>
