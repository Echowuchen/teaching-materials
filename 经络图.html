<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标准经穴部位图 - 互动学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 0.75rem;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding: 0.75rem 1.25rem;
            background: rgba(10,10,10,0.7);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(to right, #bb86fc, #03dac6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #toggleView {
            background: linear-gradient(45deg, #bb86fc, #03dac6);
            color: #0a0a0a;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(187,134,252,0.3);
        }
        #toggleView:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(187,134,252,0.4); }
        .main {
            display: flex;
            flex: 1;
            gap: 0.75rem;
            min-height: 0;
        }
        .body-view {
            flex: 3;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .body-wrapper {
            position: relative;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .body-wrapper img {
            height: 100%;
            width: auto;
            object-fit: contain;
            display: block;
        }
        .body-wrapper svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .body-wrapper svg .meridian-path {
            pointer-events: stroke;
            cursor: pointer;
            transition: all 0.3s;
            stroke-width: 2.5;
            opacity: 0.6;
        }
        .body-wrapper svg .meridian-path:hover {
            stroke-width: 4;
            opacity: 1;
            filter: drop-shadow(0 0 6px currentColor);
        }
        .body-wrapper svg .meridian-path.active {
            stroke-width: 5;
            opacity: 1;
            filter: drop-shadow(0 0 10px currentColor);
            animation: pathPulse 1.5s infinite;
        }
        .body-wrapper svg .acupoint {
            pointer-events: fill;
            cursor: pointer;
            fill: rgba(255,50,50,0.7);
            stroke: #fff;
            stroke-width: 0.5;
            opacity: 0.5;
            transition: all 0.3s;
        }
        .body-wrapper svg .acupoint:hover { opacity: 1; r: 3.5; }
        .body-wrapper svg .acupoint.active { opacity: 1; r: 4; fill: #ff0; stroke: #f80; }
        @keyframes pathPulse {
            0% { filter: drop-shadow(0 0 6px currentColor); }
            50% { filter: drop-shadow(0 0 12px currentColor); }
            100% { filter: drop-shadow(0 0 6px currentColor); }
        }
        .dot {
            fill: #ffeb3b;
            stroke: #fbc02d;
            stroke-width: 1.5;
            filter: drop-shadow(0 0 6px #ffeb3b);
        }
        .meridian-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
            padding: 0.75rem;
            background: rgba(10,10,10,0.6);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .meridian-panel::-webkit-scrollbar { width: 4px; }
        .meridian-panel::-webkit-scrollbar-thumb { background: rgba(187,134,252,0.3); border-radius: 2px; }
        .meridian-card {
            background: rgba(20,20,20,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .meridian-card:hover {
            background: rgba(30,30,30,0.8);
            transform: translateX(4px);
            border-color: rgba(187,134,252,0.3);
        }
        .meridian-card.active {
            background: linear-gradient(135deg, rgba(187,134,252,0.2), rgba(3,218,198,0.1));
            border-color: rgba(187,134,252,0.5);
            box-shadow: 0 0 12px rgba(187,134,252,0.2);
        }
        .meridian-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .meridian-name {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .color-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .meridian-meta {
            display: flex;
            gap: 6px;
        }
        .meta-badge {
            font-size: 0.7rem;
            padding: 1px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: #aaa;
        }
        .meridian-details {
            display: none;
            margin-top: 0.4rem;
            font-size: 0.78rem;
            color: #ccc;
            line-height: 1.5;
        }
        .meridian-card.active .meridian-details {
            display: block;
        }
        .detail-label { color: #bb86fc; font-weight: 500; }
        .symptom-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 2px;
        }
        .symptom-tag {
            padding: 1px 8px;
            background: rgba(243,156,18,0.15);
            border-radius: 8px;
            font-size: 0.72rem;
            color: #f39c12;
        }
        .legend {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            z-index: 10;
        }
        .legend-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 1px 0;
        }
        .legend-color {
            width: 16px;
            height: 2px;
            border-radius: 1px;
        }
        @media (max-width: 900px) {
            .main { flex-direction: column; }
            .body-view { flex: none; height: 45vh; }
            .meridian-panel { flex: 1; max-height: 45vh; }
            .header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>标准经穴部位图</h1>
        <button id="toggleView">切换到背面</button>
    </div>
    <div class="main">
        <div class="body-view">
            <div class="body-wrapper" id="bodyWrapper">
                <!-- Front view: standard acupoint chart + meridian SVG overlay -->
                <img id="frontImg" src="front.jpg" alt="标准经穴部位图 - 正面" style="height:100%;width:auto;object-fit:contain;">
                <img id="backImg" src="back.jpg" alt="标准经穴部位图 - 背面" style="height:100%;width:auto;object-fit:contain;">
                
                <!-- SVG overlay for meridian paths -->
                <svg id="meridianSvg" viewBox="0 0 290 870" preserveAspectRatio="xMidYMid meet">
                    <!-- Front view meridian paths -->
                    <g id="frontPaths">
                        <!-- 手太阴肺经 -->

                        <!-- 手少阴心经 -->

                        <!-- 手厥阴心包经 -->

                        <!-- 足阳明胃经 -->

                        <!-- 足少阳胆经 -->
                        <path id="path_足少阳胆经" d="M 60,116 L 65,145 L 70,174 L 75,203 L 75,232 L 75,261 L 75,290 L 75,348 L 75,406 L 80,464 L 80,522 L 80,580 L 80,638 L 80,696 L 80,754 L 80,798" stroke="#f1c40f" class="meridian-path" data-meridian="足少阳胆经" data-view="front"/>
                        <!-- 足厥阴肝经 -->
                        <path id="path_足厥阴肝经" d="M 125,798 L 125,754 L 125,696 L 125,638 L 125,580 L 125,522 L 125,464 L 120,406 L 115,348 L 110,290" stroke="#27ae60" class="meridian-path" data-meridian="足厥阴肝经" data-view="front"/>
                        <!-- 足少阴肾经 -->
                        <path id="path_足少阴肾经" d="M 120,798 L 120,754 L 120,696 L 120,638 L 120,580 L 120,522 L 120,464 L 120,406 L 130,348 L 140,290" stroke="#2980b9" class="meridian-path" data-meridian="足少阴肾经" data-view="front"/>
                        
                        <!-- Acupoint dots (front) -->
                        <circle cx="145" cy="378" r="2.5" class="acupoint" data-meridian="手太阴肺经"/><circle cx="115" cy="368" r="2.5" class="acupoint" data-meridian="手太阴肺经"/><circle cx="75" cy="389" r="2.5" class="acupoint" data-meridian="手太阴肺经"/><circle cx="50" cy="505" r="2.5" class="acupoint" data-meridian="手太阴肺经"/>
                        <circle cx="155" cy="336" r="2.5" class="acupoint" data-meridian="足阳明胃经"/><circle cx="155" cy="505" r="2.5" class="acupoint" data-meridian="足阳明胃经"/><circle cx="155" cy="673" r="2.5" class="acupoint" data-meridian="足阳明胃经"/><circle cx="155" cy="841" r="2.5" class="acupoint" data-meridian="足阳明胃经"/><circle cx="155" cy="1009" r="2.5" class="acupoint" data-meridian="足阳明胃经"/>
                        <circle cx="135" cy="1009" r="2.5" class="acupoint" data-meridian="足太阴脾经"/><circle cx="135" cy="757" r="2.5" class="acupoint" data-meridian="足太阴脾经"/><circle cx="140" cy="505" r="2.5" class="acupoint" data-meridian="足太阴脾经"/>
                        <circle cx="75" cy="294" r="2.5" class="acupoint" data-meridian="足少阳胆经"/><circle cx="75" cy="505" r="2.5" class="acupoint" data-meridian="足少阳胆经"/><circle cx="80" cy="757" r="2.5" class="acupoint" data-meridian="足少阳胆经"/><circle cx="80" cy="1009" r="2.5" class="acupoint" data-meridian="足少阳胆经"/>
                        <circle cx="125" cy="841" r="2.5" class="acupoint" data-meridian="足厥阴肝经"/><circle cx="115" cy="505" r="2.5" class="acupoint" data-meridian="足厥阴肝经"/>
                        <circle cx="120" cy="757" r="2.5" class="acupoint" data-meridian="足少阴肾经"/><circle cx="130" cy="505" r="2.5" class="acupoint" data-meridian="足少阴肾经"/>
                    </g>
                    
                    <!-- Back view meridian paths (hidden by default) -->
                    <g id="backPaths" style="display:none">
                        <!-- 足太阳膀胱经 -->
                        <path id="path_足太阳膀胱经" d="M 145,44 L 145,87 L 145,130 L 135,188 L 130,246 L 130,304 L 130,362 L 130,420 L 130,478 L 130,536 L 130,594 L 130,652 L 130,710 L 130,768" stroke="#9b59b6" class="meridian-path" data-meridian="足太阳膀胱经" data-view="back"/>
                        <!-- 手阳明大肠经 -->
                        <path id="path_手阳明大肠经" d="M 220,341 L 210,312 L 205,283 L 205,254 L 210,225 L 220,196 L 225,167 L 225,138 L 220,116 L 210,102 L 200,102" stroke="#2ecc71" class="meridian-path" data-meridian="手阳明大肠经" data-view="back"/>
                        <!-- 手太阳小肠经 -->
                        <path id="path_手太阳小肠经" d="M 235,362 L 225,334 L 220,304 L 220,276 L 225,246 L 230,218 L 230,188 L 225,160 L 215,130 L 200,116" stroke="#3498db" class="meridian-path" data-meridian="手太阳小肠经" data-view="back"/>
                        <!-- 手少阳三焦经 -->
                        <path id="path_手少阳三焦经" d="M 225,348 L 218,319 L 215,290 L 218,261 L 225,232 L 230,203 L 228,174 L 220,145 L 205,123 L 195,123" stroke="#e67e22" class="meridian-path" data-meridian="手少阳三焦经" data-view="back"/>
                        
                        <!-- Acupoint dots (back) -->
                        <circle cx="145" cy="64" r="2.5" class="acupoint" data-meridian="足太阳膀胱经"/><circle cx="130" cy="273" r="2.5" class="acupoint" data-meridian="足太阳膀胱经"/><circle cx="130" cy="525" r="2.5" class="acupoint" data-meridian="足太阳膀胱经"/><circle cx="130" cy="777" r="2.5" class="acupoint" data-meridian="足太阳膀胱经"/><circle cx="130" cy="1030" r="2.5" class="acupoint" data-meridian="足太阳膀胱经"/>
                        <circle cx="220" cy="284" r="2.5" class="acupoint" data-meridian="手阳明大肠经"/><circle cx="210" cy="148" r="2.5" class="acupoint" data-meridian="手阳明大肠经"/>
                        <circle cx="230" cy="316" r="2.5" class="acupoint" data-meridian="手太阳小肠经"/><circle cx="200" cy="168" r="2.5" class="acupoint" data-meridian="手太阳小肠经"/>
                        <circle cx="225" cy="336" r="2.5" class="acupoint" data-meridian="手少阳三焦经"/><circle cx="195" cy="178" r="2.5" class="acupoint" data-meridian="手少阳三焦经"/>
                    </g>
                    
                    <!-- Animated dot -->
                    <circle id="flowDot" class="dot" r="4" cx="0" cy="0" style="display:none"/>
                    
                    <!-- Legend overlay -->
                    <foreignObject x="5" y="805" width="280" height="45">
                        <div xmlns="http://www.w3.org/1999/xhtml" class="legend">
                            <div class="legend-row"><span class="legend-color" style="background:#95a5a6"></span>肺经</div>
                            <div class="legend-row"><span class="legend-color" style="background:#e74c3c"></span>心经</div>
                            <div class="legend-row"><span class="legend-color" style="background:#f39c12"></span>心包经</div>
                            <div class="legend-row"><span class="legend-color" style="background:#2ecc71"></span>胃经</div>
                            <div class="legend-row"><span class="legend-color" style="background:#1abc9c"></span>脾经</div>
                        </div>
                    </foreignObject>
                </svg>
            </div>
        </div>
        
        <div class="meridian-panel" id="meridianPanel">
            <!-- Cards generated by JS -->
        </div>
    </div>
</div>

<script>
const meridianData = {
    "手太阴肺经": { icon: "🫁", group: "hand-yin", route: "胸→上肢内侧前缘→拇指", organ: "肺→大肠", direction: "胸→手", symptoms: ["咳嗽", "气喘", "咽喉肿痛", "肩背痛"], cause: "肺主皮毛、主宣发肃降，外邪犯肺则咳喘", color: "#95a5a6" },
    "手少阴心经": { icon: "❤️", group: "hand-yin", route: "胸→上肢内侧后缘→小指", organ: "心→小肠", direction: "胸→手", symptoms: ["心痛", "咽干", "口渴", "手臂内侧痛"], cause: "心主血脉，心血不足则心悸心痛", color: "#e74c3c" },
    "手厥阴心包经": { icon: "🧡", group: "hand-yin", route: "胸→上肢内侧中间→中指", organ: "心包→三焦", direction: "胸→手", symptoms: ["心悸", "胸痛", "掌中热"], cause: "心包代心受邪，保护心脏", color: "#f39c12" },
    "手阳明大肠经": { icon: "🦷", group: "hand-yang", route: "食指→上肢外侧前缘→颈部→面部", organ: "大肠→肺", direction: "手→头", symptoms: ["下牙痛", "面颊肿", "咽喉肿痛", "腹痛"], cause: "大肠经循行下齿，经气不利则牙痛", color: "#2ecc71" },
    "手太阳小肠经": { icon: "👂", group: "hand-yang", route: "小指→上肢外侧后缘→颈部→耳前", organ: "小肠→心", direction: "手→头", symptoms: ["耳聋", "耳鸣", "颈项痛", "咽喉痛"], cause: "小肠经走耳前，经气不通则耳疾", color: "#3498db" },
    "手少阳三焦经": { icon: "🔥", group: "hand-yang", route: "无名指→上肢外侧中间→颈部→耳后", organ: "三焦→心包", direction: "手→头", symptoms: ["耳鸣", "耳聋", "咽喉肿痛", "侧头痛"], cause: "三焦主气机，气滞则耳鸣", color: "#e67e22" },
    "足阳明胃经": { icon: "🍚", group: "foot-yang", route: "面部→胸腹→下肢前外侧→足背", organ: "胃→脾", direction: "头→足", symptoms: ["胃痛", "呕吐", "膝关节痛", "足背痛"], cause: "胃主受纳腐熟，胃气不降则呕", color: "#2ecc71" },
    "足太阳膀胱经": { icon: "🏔️", group: "foot-yang", route: "头→后背→腰部→下肢后侧→足小趾", organ: "膀胱→肾", direction: "头→足", symptoms: ["后头痛", "项强", "腰背痛", "腿后侧痛"], cause: "膀胱经走后背最长，是最易受邪的经脉", color: "#9b59b6" },
    "足少阳胆经": { icon: "🌙", group: "foot-yang", route: "头侧→胁肋→下肢外侧→足背", organ: "胆→肝", direction: "头→足", symptoms: ["侧头痛", "胁肋胀痛", "口苦", "目眩"], cause: "胆主疏泄，胆火上炎则口苦目眩", color: "#f1c40f" },
    "足太阴脾经": { icon: "🟡", group: "foot-yin", route: "足大趾→下肢内侧→腹部→胸部", organ: "脾→胃", direction: "足→胸", symptoms: ["腹胀", "便溏", "舌强", "身重无力"], cause: "脾主运化，脾虚则运化失常", color: "#1abc9c" },
    "足少阴肾经": { icon: "💧", group: "foot-yin", route: "足小趾→下肢内侧后缘→腹部→胸部", organ: "肾→膀胱", direction: "足→胸", symptoms: ["腰痛", "足心热", "月经不调", "哮喘"], cause: "肾藏精，肾虚则腰膝酸软", color: "#2980b9" },
    "足厥阴肝经": { icon: "🌿", group: "foot-yin", route: "足大趾→下肢内侧→胁肋→腹部", organ: "肝→胆", direction: "足→胸", symptoms: ["胁肋胀痛", "少腹胀", "疝气", "月经不调"], cause: "肝主疏泄，肝气郁结则胁痛", color: "#27ae60" }
};

const frontMeridians = ["手太阴肺经","手少阴心经","手厥阴心包经","足阳明胃经","足太阴脾经","足少阳胆经","足厥阴肝经","足少阴肾经"];
const backMeridians = ["足太阳膀胱经","手阳明大肠经","手太阳小肠经","手少阳三焦经"];

let currentView = 'front';
let activeMeridian = null;
let animTimer = null;
let dotEl = document.getElementById('flowDot');

function renderCards(filterView) {
    const panel = document.getElementById('meridianPanel');
    panel.innerHTML = '';
    const keys = filterView === 'front' ? frontMeridians : backMeridians;
    keys.forEach(name => {
        const d = meridianData[name];
        const card = document.createElement('div');
        card.className = 'meridian-card';
        card.dataset.meridian = name;
        card.innerHTML = `
            <div class="meridian-header">
                <span class="meridian-name"><span class="color-dot" style="background:${d.color}"></span>${d.icon} ${name}</span>
                <span class="meta-badge">${d.direction}</span>
            </div>
            <div class="meridian-details">
                <div><span class="detail-label">循行：</span>${d.route}</div>
                <div><span class="detail-label">脏腑：</span>${d.organ}</div>
                <div><span class="detail-label">病因：</span>${d.cause}</div>
                <div class="symptom-tags">${d.symptoms.map(s => `<span class="symptom-tag">${s}</span>`).join('')}</div>
            </div>`;
        card.addEventListener('click', () => selectMeridian(name));
        panel.appendChild(card);
    });
}

function selectMeridian(name) {
    stopAnim();
    // Deselect previous
    document.querySelectorAll('.meridian-card.active, .meridian-path.active, .acupoint.active').forEach(el => el.classList.remove('active'));
    activeMeridian = name;
    // Select card
    const card = document.querySelector(`.meridian-card[data-meridian="${name}"]`);
    if (card) { card.classList.add('active'); card.scrollIntoView({behavior:'smooth', block:'center'}); }
    // Show details on this card
    const details = card ? card.querySelector('.meridian-details') : null;
    if (details) details.style.display = 'block';
    // Select path
    const path = document.getElementById(`path_${name}`);
    if (path) path.classList.add('active');
    // Select acupoints
    document.querySelectorAll(`.acupoint[data-meridian="${name}"]`).forEach(el => el.classList.add('active'));
    // Animate
    startAnim(name);
}

function startAnim(name) {
    const view = currentView;
    const path = document.getElementById(`path_${name}`);
    if (!path) return;
    const len = path.getTotalLength();
    let pos = 0;
    dotEl.style.display = 'block';
    animTimer = setInterval(() => {
        pos += 0.005;
        if (pos > 1) pos = 0;
        const pt = path.getPointAtLength(pos * len);
        dotEl.setAttribute('cx', pt.x);
        dotEl.setAttribute('cy', pt.y);
    }, 30);
}

function stopAnim() {
    if (animTimer) { clearInterval(animTimer); animTimer = null; }
    dotEl.style.display = 'none';
}

function toggleView() {
    const frontPaths = document.getElementById('frontPaths');
    const backPaths = document.getElementById('backPaths');
    const frontImg = document.getElementById('frontImg');
    const backImg = document.getElementById('backImg');
    const btn = document.getElementById('toggleView');
    stopAnim();
    document.querySelectorAll('.meridian-card.active, .meridian-path.active, .acupoint.active').forEach(el => el.classList.remove('active'));
    if (currentView === 'front') {
        frontPaths.style.display = 'none';
        backPaths.style.display = 'block';
        frontImg.style.display = 'none';
        backImg.style.display = 'block';
        currentView = 'back';
        btn.textContent = '切换到正面';
        // Update legend for back
        document.querySelector('.legend').innerHTML = `
            <div class="legend-row"><span class="legend-color" style="background:#9b59b6"></span>膀胱经</div>
            <div class="legend-row"><span class="legend-color" style="background:#2ecc71"></span>大肠经</div>
            <div class="legend-row"><span class="legend-color" style="background:#3498db"></span>小肠经</div>
            <div class="legend-row"><span class="legend-color" style="background:#e67e22"></span>三焦经</div>`;
    } else {
        frontPaths.style.display = 'block';
        backPaths.style.display = 'none';
        frontImg.style.display = 'block';
        backImg.style.display = 'none';
        currentView = 'front';
        btn.textContent = '切换到背面';
        document.querySelector('.legend').innerHTML = `
            <div class="legend-row"><span class="legend-color" style="background:#95a5a6"></span>肺经</div>
            <div class="legend-row"><span class="legend-color" style="background:#e74c3c"></span>心经</div>
            <div class="legend-row"><span class="legend-color" style="background:#f39c12"></span>心包经</div>
            <div class="legend-row"><span class="legend-color" style="background:#2ecc71"></span>胃经</div>
            <div class="legend-row"><span class="legend-color" style="background:#1abc9c"></span>脾经</div>`;
    }
    activeMeridian = null;
    renderCards(currentView);
}

// Hover effects
document.addEventListener('mouseover', e => {
    const el = e.target.closest('.meridian-path');
    if (el) el.classList.add('hover');
});
document.addEventListener('mouseout', e => {
    const el = e.target.closest('.meridian-path');
    if (el) el.classList.remove('hover');
});

// Init
document.getElementById('toggleView').addEventListener('click', toggleView);
renderCards('front');
</script>
</body>
</html>
